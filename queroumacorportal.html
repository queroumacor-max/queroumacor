const PintoresList = () => {
  const [pintores, setPintores] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetchPintores = async () => {
    const { data, error } = await window._sb.from('profiles').select('*').order('created_at', { ascending: false });
    if (!error && data) setPintores(data);
    setLoading(false);
  };

  useEffect(() => { fetchPintores(); }, []);

  const updateVerified = async (id, verified) => {
    await window._sb.from('profiles').update({ verified }).eq('id', id);
    fetchPintores();
  };

  if (loading) return <div style={{ padding: 20, color: C.muted }}>Carregando pintores...</div>;

  return (
    <div style={{ background: C.white, borderRadius: 16, padding: 20, boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
      <div style={{ fontWeight: 700, marginBottom: 16, color: C.ink }}>🖌️ Pintores — Aprovação Pendente</div>
      {pintores.length === 0 && <div style={{ color: C.muted, fontSize: 13 }}>Nenhum pintor cadastrado.</div>}
      {pintores.map((p, i) => (
        <div key={p.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 0', borderBottom: i < pintores.length - 1 ? '1px solid ' + C.border : 'none' }}>
          <div style={{ width:40, height:40, borderRadius:'50%', background:C.p2, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>{(p.name || '?')[0]}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:600 }}>{p.name || 'Sem nome'}</div>
            <div style={{ fontSize:12, color:C.muted }}>{[p.city, p.state].filter(Boolean).join(', ') || 'Sem localização'} · ⭐ {p.rating_avg != null ? Number(p.rating_avg).toFixed(1) : '—'}</div>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {!p.verified ? (
              <>
                <button onClick={() => updateVerified(p.id, true)} style={{ background:C.p6, color:'#fff', border:'none', borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:12 }}>✓ Aprovar</button>

              </>
            ) : (
              <span style={{ background:C.p6+'22', color:C.p6, borderRadius:8, padding:'6px 12px', fontSize:12, fontWeight:600 }}>✓ Aprovado</span>
            )}
          </div>

      ))}
    </div>
  );
};

const Leads = () => {
  const [leads, setLeads] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filtro, setFiltro] = useState('Todos');

  useEffect(() => {
    (async () => {
      const { data, error } = await window._sb
        .from('leads')
        .select('*')
        .order('created_at', { ascending: false });
      if (!error && data) setLeads(data);
      setLoading(false);
    })();
  }, []);

  const statusColor = (s) => {
    const map = { novo: C.p3, contactado: C.p7, qualificado: C.p6, convertido: C.p1, perdido: C.p4 };
    return map[s] || C.muted;
  };

  const origemIcon = (o) => {
    const map = { site: '🌐', indicacao: '🤝', instagram: '📸', whatsapp: '📱', evento: '🎪' };
    return map[o] || '📋';
  };

  const filtered = filtro === 'Todos' ? leads : leads.filter(l => l.status === filtro.toLowerCase());

  const counts = { total: leads.length };
  ['novo','contactado','qualificado','convertido','perdido'].forEach(s => {
    counts[s] = leads.filter(l => l.status === s).length;
  });

  if (loading) return <div style={{ padding: 20, color: C.muted }}>Carregando leads...</div>;

  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 16, marginBottom: 24 }}>
        <KPICard title="Total de Leads" value={counts.total} sub="cadastrados" trend="" color={C.muted} />
        <KPICard title="Novos" value={counts.novo} sub="aguardando contato" trend="" color={C.p3} />
        <KPICard title="Qualificados" value={counts.qualificado} sub="prontos p/ proposta" trend="" color={C.p6} />
        <KPICard title="Convertidos" value={counts.convertido} sub="viraram clientes" trend="" color={C.p1} />
        <KPICard title="Perdidos" value={counts.perdido} sub="não converteram" trend="" color={C.p4} />
      </div>

      <div style={{ background: C.white, borderRadius: 16, padding: 20, boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div style={{ fontWeight: 700, color: C.ink }}>📋 Leads</div>
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          {['Todos','Novo','Contactado','Qualificado','Convertido','Perdido'].map(f => (
            <button key={f} onClick={() => setFiltro(f)} style={{
              padding: '6px 14px', borderRadius: 20, border: '1px solid ' + (filtro === f ? C.p1 : C.border),
              background: filtro === f ? C.p1 : 'transparent', color: filtro === f ? '#fff' : C.ink,
              cursor: 'pointer', fontSize: 12, fontWeight: filtro === f ? 600 : 400
            }}>{f}</button>
          ))}
        </div>

        {filtered.length === 0 && (
          <div style={{ padding: '20px 0', color: C.muted, textAlign: 'center', fontSize: 13 }}>Nenhum lead encontrado.</div>
        )}

        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          {filtered.length > 0 && (
            <thead>
              <tr style={{ borderBottom: '2px solid ' + C.border }}>
                {['Nome','Email','Telefone','Origem','Status','Data'].map(h => (
                  <th key={h} style={{ textAlign: 'left', padding: '8px 12px', color: C.muted, fontWeight: 600, fontSize: 11, textTransform: 'uppercase' }}>{h}</th>
                ))}
              </tr>
            </thead>
          )}
          <tbody>
            {filtered.map((l, i) => {
              const data = l.created_at ? new Date(l.created_at).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) : '—';
              const sc = statusColor(l.status);
              return (
                <tr key={l.id || i} style={{ borderBottom: '1px solid ' + C.border }}>
                  <td style={{ padding: '10px 12px', fontWeight: 600 }}>{l.name || '—'}</td>
                  <td style={{ padding: '10px 12px', color: C.muted }}>{l.email || '—'}</td>
                  <td style={{ padding: '10px 12px', color: C.muted }}>{l.phone || '—'}</td>
                  <td style={{ padding: '10px 12px' }}>
                    <span>{origemIcon(l.source)} {l.source || '—'}</span>
                  </td>
                  <td style={{ padding: '10px 12px' }}>
                    <span style={{ background: sc + '22', color: sc, borderRadius: 8, padding: '3px 10px', fontSize: 11 }}>{l.status || '—'}</span>
                  </td>
                  <td style={{ padding: '10px 12px', color: C.muted }}>{data}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const STATUS_MAP = { pending: 'pendente', accepted: 'aceito', completed: 'concluido', rejected: 'rejeitado' };

const Orcamentos = () => {
  const [orcamentos, setOrcamentos] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      const { data, error } = await window._sb
        .from('quotes')
        .select('*, client:profiles!client_id(name), painter:profiles!painter_id(name)')
        .order('created_at', { ascending: false });
      if (!error && data) setOrcamentos(data);
      setLoading(false);
    })();
  }, []);

  if (loading) return <div style={{ padding: 20, color: C.muted }}>Carregando orçamentos...</div>;

  return (
    <div style={{ background:C.white, borderRadius:16, padding:20, boxShadow:'0 2px 12px rgba(0,0,0,0.06)' }}>
      <div style={{ fontWeight:700, marginBottom:16, color:C.ink }}>📋 Orçamentos</div>
      <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
        <thead>
          <tr style={{ borderBottom:'2px solid '+C.border }}>
            {['Cliente','Pintor','Serviço','Valor','Status','Data'].map(h => (
              <th key={h} style={{ textAlign:'left', padding:'8px 12px', color:C.muted, fontWeight:600, fontSize:11, textTransform:'uppercase' }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {orcamentos.length === 0 && (
            <tr><td colSpan={6} style={{ padding: '20px 12px', color: C.muted, textAlign: 'center' }}>Nenhum orçamento encontrado.</td></tr>
          )}
          {orcamentos.map((o, i) => {
            const st = STATUS_MAP[o.status] || o.status;
            const data = o.created_at ? new Date(o.created_at).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) : '—';
            return (
              <tr key={o.id || i} style={{ borderBottom:'1px solid '+C.border }}>
                <td style={{ padding:'10px 12px' }}>{o.client?.name || '—'}</td>
                <td style={{ padding:'10px 12px' }}>{o.painter?.name || '—'}</td>
                <td style={{ padding:'10px 12px', color:C.muted }}>{o.service_type || o.title || '—'}</td>
                <td style={{ padding:'10px 12px', fontWeight:700 }}>{o.price != null ? 'R$ ' + Number(o.price).toLocaleString('pt-BR') : '—'}</td>
                <td style={{ padding:'10px 12px' }}>
                  <span style={{ background:st==='aceito'?C.p6+'22':st==='pendente'?C.p7+'44':st==='rejeitado'?C.p4+'22':C.p3+'22', color:st==='aceito'?C.p6:st==='pendente'?'#b8860b':st==='rejeitado'?C.p4:C.p3, borderRadius:8, padding:'3px 10px', fontSize:11 }}>{st}</span>
                </td>
                <td style={{ padding:'10px 12px', color:C.muted }}>{data}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
};

const PAGES = [
  { id:'dashboard', icon:'📊', label:'Dashboard', section:'PRINCIPAL', component:<Dashboard /> },
  { id:'chats', icon:'💬', label:'Chats 3-Way', section:'PRINCIPAL', badge:7, component:<Chats /> },
  { id:'orcamentos', icon:'📋', label:'Orçamentos', section:'PRINCIPAL', badge:12, component:<Orcamentos /> },
  { id:'pintores', icon:'🖌️', label:'Pintores', section:'PESSOAS', badge:3, component:<PintoresList /> },
  { id:'leads', icon:'🧲', label:'Leads', section:'PESSOAS', component:<Leads /> },
  { id:'clientes', icon:'👥', label:'Clientes', section:'PESSOAS', component:<div style={{padding:20,color:C.muted}}>Lista de clientes em desenvolvimento...</div> },
  { id:'produtos', icon:'🎨', label:'Produtos / Tintas', section:'LOJA', component:<ProdutosList /> },
  { id:'camisetas', icon:'👕', label:'Camisetas Personalizadas', section:'LOJA', component:<Camisetas /> },
  { id:'cursos', icon:'📚', label:'Cursos', section:'LOJA', component:<div style={{padding:20,color:C.muted}}>Gestão de cursos em desenvolvimento...</div> },
  { id:'marketing', icon:'📣', label:'Marketing / Ads', section:'LOJA', component:<div style={{padding:20,color:C.muted}}>Ferramentas de marketing em desenvolvimento...</div> },
  { id:'analytics', icon:'📈', label:'Analytics', section:'DADOS', component:<Analytics /> },
  { id:'avaliacoes', icon:'⭐', label:'Avaliações', section:'DADOS', component:<div style={{padding:20,color:C.muted}}>Gestão de avaliações em desenvolvimento...</div> },
];

function App() {
  const [page, setPage] = useState('dashboard');
  const [loggedIn, setLoggedIn] = useState(false);
  const [loginError, setLoginError] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');

  if (!loggedIn) return (
    <div style={{ minHeight:'100vh', background:C.ink, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ background:C.white, borderRadius:24, padding:40, width:360, boxShadow:'0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ fontFamily:'Syne,sans-serif', fontSize:24, fontWeight:800, marginBottom:4 }}>
          <span style={{ color:C.ink }}>Cali</span><span style={{ color:C.p1 }}>Colors</span>
        </div>
        <div style={{ fontSize:13, color:C.muted, marginBottom:28 }}>Portal de Gestão QueroUmaCor</div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>Email</div>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="loja@calicolors.com.br" style={{ width:'100%', padding:'10px 14px', borderRadius:10, border:'1px solid '+C.border, fontSize:14, outline:'none' }} />
        </div>
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>Senha</div>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" style={{ width:'100%', padding:'10px 14px', borderRadius:10, border:'1px solid '+C.border, fontSize:14, outline:'none' }} />
        </div>
        {loginError && <div style={{color:'#e63946',fontSize:13,marginBottom:12,textAlign:'center'}}>{loginError}</div>}
        <button disabled={loginLoading} onClick={async()=>{ setLoginError(''); setLoginLoading(true); try { const {data,error} = await window._sb.auth.signInWithPassword({email,password:pw}); if(error) throw error; setLoggedIn(true); } catch(e){ setLoginError(e.message||'Email ou senha incorretos'); } finally { setLoginLoading(false); } }} style={{ width:'100%', padding:'12px', background:C.p1, color:'#fff', border:'none', borderRadius:12, fontSize:15, fontWeight:700, cursor:'pointer' }}>
          Entrar no Portal
        </button>
        <div style={{ textAlign:'center', marginTop:12, fontSize:12, color:C.muted }}>Acesso exclusivo Cali Colors</div>
      </div>
    </div>
  );

  const currentPage = PAGES.find(p => p.id === page);
  const sections = [...new Set(PAGES.map(p => p.section))];

  return (
    <div style={{ display:'flex', minHeight:'100vh', fontFamily:'DM Sans, sans-serif' }}>
      {/* SIDEBAR */}
      <div style={{ width:240, background:C.ink, position:'fixed', top:0, left:0, height:'100vh', overflowY:'auto', zIndex:100 }}>
        <Logo />
        <div style={{ padding:'8px 0', marginTop:8 }}>
          {sections.map(section => (
            <div key={section}>
              <div style={{ fontSize:10, color:C.muted, letterSpacing:2, textTransform:'uppercase', padding:'12px 20px 4px' }}>{section}</div>
              {PAGES.filter(p => p.section === section).map(p => (
                <NavItem key={p.id} icon={p.icon} label={p.label} badge={p.badge} active={page===p.id} onClick={()=>setPage(p.id)} />
              ))}
            </div>
          ))}
        </div>
        <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:16, borderTop:'1px solid rgba(255,255,255,0.1)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, color:'rgba(255,255,255,0.7)', fontSize:13 }}>
            <div style={{ width:32, height:32, borderRadius:'50%', background:C.p1, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, color:'#fff' }}>C</div>
            <div>
              <div style={{ fontWeight:600, color:C.white }}>Cali Colors</div>
              <div style={{ fontSize:11 }}>Plano Business · Ativo</div>
            </div>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{ marginLeft:240, flex:1, display:'flex', flexDirection:'column' }}>
        {/* TOPBAR */}
        <div style={{ background:C.white, borderBottom:'1px solid '+C.border, padding:'0 28px', height:60, display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:50 }}>
          <div>
            <div style={{ fontFamily:'Syne, sans-serif', fontSize:18, fontWeight:800, color:C.ink }}>{currentPage?.label}</div>
            <div style={{ fontSize:12, color:C.muted }}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <button onClick={()=>setLoggedIn(false)} style={{ background:'transparent', border:'1px solid '+C.border, borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:12, color:C.muted }}>Sair</button>
          </div>
        </div>

        {/* CONTENT */}
        <div style={{ padding:28, flex:1 }}>
          {currentPage?.component}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
